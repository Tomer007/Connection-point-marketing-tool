services:
  - type: web
    name: connection-point-marketing-tool
    runtime: node
    plan: starter
    buildCommand: pip install yt-dlp && export PATH=$PATH:/opt/render/.local/bin && npm run render-build
    startCommand: export PATH=$PATH:/opt/render/.local/bin && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_ANTHROPIC_API_KEY
        sync: false
      - key: VITE_OPENAI_API_KEY
        sync: false
      - key: VITE_GROQ_API_KEY
        sync: false
      - key: VITE_SERVER_URL
        value: ""
